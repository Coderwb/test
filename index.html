<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Betala 25 kr med Swish</title>
<link href="https://googleapis.com" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: linear-gradient(135deg, #00B86C, #009E5B, #007A47);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    font-family: 'Inter', sans-serif;
    color: white;
  }
  .container {
    background: rgba(255, 255, 255, 0.12);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255, 255, 255, 0.25);
    border-radius: 24px;
    padding: 35px;
    max-width: 420px;
    width: 100%;
    box-shadow: 0 8px 32px rgba(0,0,0,0.25);
    text-align: center;
  }
  .swish-logo { font-size: 56px; margin-bottom: 15px; }
  h1 { font-size: 26px; font-weight: 800; margin-bottom: 8px; }
  .price {
    font-size: 42px;
    font-weight: 800;
    color: #fff;
    margin: 15px 0;
    text-shadow: 0 2px 8px rgba(0,0,0,0.2);
  }
  p { opacity: 0.9; margin-bottom: 25px; font-size: 16px; }
  
  /* Kopieringsrutan för meddelandet */
  .msg-box {
    background: rgba(255, 255, 255, 0.15);
    border: 1px solid rgba(255, 255, 255, 0.2);
    border-radius: 14px;
    padding: 12px;
    margin-bottom: 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .msg-text { font-weight: 600; font-size: 16px; }
  .copy-btn {
    background: white;
    color: #00B86C;
    border: none;
    padding: 6px 12px;
    border-radius: 8px;
    font-size: 12px;
    font-weight: 800;
    cursor: pointer;
  }

  /* Huvudknappen */
  .main-btn {
    width: 100%;
    padding: 18px;
    border: none;
    border-radius: 14px;
    background: white;
    color: #00B86C;
    font-weight: 800;
    font-size: 18px;
    cursor: pointer;
    transition: 0.2s;
    box-shadow: 0 4px 15px rgba(0,0,0,0.2);
  }
  .main-btn:hover { 
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(0,0,0,0.3);
  }
  .info {
    margin-top: 20px;
    padding: 14px;
    background: rgba(255, 255, 255, 0.2);
    border-radius: 12px;
    font-size: 13px;
    font-weight: 600;
    text-align: center;
    opacity: 0.9;
  }
</style>
</head>
<body>
<div class="container">
  <div class="swish-logo">💚</div>
  <h1>Betala med Swish</h1>
  <div class="price">25 kr</div>
  <p><strong>Till:</strong> 072-378 26 29</p>

  <!-- Kopiera meddelande sektion -->
  <div class="msg-box">
    <span>Meddelande: <strong class="msg-text" id="msgToCopy">Tack</strong></span>
    <button class="copy-btn" id="copyBtn">KOPIERA</button>
  </div>

  <button class="main-btn" id="swishBtn">Öppna Swish & Betala</button>

  <div class="info">
    Klicka på KOPIERA först, klistra sedan in i Swish-appen om fältet är tomt!
  </div>
</div>

<script>
// Funktion för att kopiera meddelandet "Tack"
document.getElementById('copyBtn').addEventListener('click', () => {
  const text = document.getElementById('msgToCopy').innerText;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('copyBtn');
    btn.innerText = 'KOPIERAT!';
    btn.style.background = '#007A47';
    btn.style.color = 'white';
    setTimeout(() => {
      btn.innerText = 'KOPIERA';
      btn.style.background = 'white';
      btn.style.color = '#00B86C';
    }, 2000);
  });
});

// Funktion för att öppna Swish-appen
document.getElementById('swishBtn').addEventListener('click', () => {
  const amount = 25;
  const message = "Tack";
  const phone = "0723782629";
  
  const swishUrl = `swish://payment?phone=${phone}&amount=${amount}&message=${encodeURIComponent(message)}`;
  window.location.href = swishUrl;
});
</script>
</body>
</html>
