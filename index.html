<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Betala 25 kr med Swish</title>
<link href="https://googleapis.com" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  /* Svart bakgrund för hela sidan */
  body {
    background: #000000;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    font-family: 'Inter', sans-serif;
    color: #ff0000; /* Röd text */
  }
  
  /* Behållaren för Swish-boxen */
  .container {
    background: rgba(255, 255, 255, 0.05);
    border: 2px solid #ff0000; /* Röd ram */
    border-radius: 24px;
    padding: 35px;
    max-width: 420px;
    width: 100%;
    box-shadow: 0 8px 32px rgba(255,0,0,0.1);
    text-align: center;
  }
  
  .swish-logo { font-size: 56px; margin-bottom: 15px; }
  
  /* Röd färg på alla rubriker och texter */
  h1 { font-size: 26px; font-weight: 800; margin-bottom: 8px; color: #ff0000; }
  
  .price-box {
    margin: 20px 0;
  }
  .price {
    font-size: 42px;
    font-weight: 800;
    color: #ff0000;
    text-shadow: 0 2px 8px rgba(0,0,0,0.5);
  }
  .details {
    font-size: 15px;
    line-height: 1.6;
    margin-top: 5px;
    color: #ff0000;
  }

  /* Formulär och Input */
  form {
    text-align: left;
    margin-top: 25px;
  }
  label { 
    display: block; 
    font-weight: 600; 
    font-size: 14px; 
    margin-bottom: 8px;
    color: #ff0000;
  }
  input {
    width: 100%;
    padding: 16px;
    border-radius: 14px;
    border: 2px solid #ff0000; /* Röd ram på inmatningsfältet */
    background: rgba(0, 0, 0, 0.8);
    color: #ff0000; /* Röd text i fältet */
    font-size: 17px;
    font-weight: 500;
    outline: none;
    transition: 0.2s;
  }
  input:focus {
    background: #000000;
    box-shadow: 0 0 10px rgba(255, 0, 0, 0.5);
  }
  input::placeholder { color: rgba(255, 0, 0, 0.4); }

  /* Knapp */
  button {
    width: 100%;
    padding: 18px;
    margin-top: 25px;
    border: none;
    border-radius: 14px;
    background: #ff0000; /* Röd knapp */
    color: #000000; /* Svart text på knappen */
    font-weight: 800;
    font-size: 18px;
    cursor: pointer;
    transition: 0.2s;
    box-shadow: 0 4px 15px rgba(255,0,0,0.3);
  }
  button:hover { 
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(255,0,0,0.5);
  }
  button:active {
    transform: translateY(0px);
  }
</style>
</head>
<body>
<div class="container">
  <div class="swish-logo">🔥</div>
  <h1>Betala med Swish</h1>
  
  <div class="price-box">
    <div class="price">25 kr</div>
    <div class="details">
      <strong>Beskrivning:</strong> Tack
    </div>
  </div>

  <form id="swishForm">
    <label for="payerNumber">Ditt telefonnummer</label>
    <input type="tel" id="payerNumber" placeholder="t.ex. 0701234567" required pattern="[0-9]{10}" inputmode="numeric">

    <button type="submit">Öppna Swish & Betala</button>
  </form>
</div>

<script>
document.getElementById('swishForm').addEventListener('submit', (e) => {
  e.preventDefault();
  
  const amount = 25;
  const message = "Tack";
  const phone = "0723782629"; // Mottagarnummer behålls doldt här
  
  // KORRIGERING: Använder nu "payee" istället för "phone" så att det matchar Swish system
  const swishUrl = `swish://payment?payee=${phone}&amount=${amount}&message=${encodeURIComponent(message)}`;
  
  window.location.href = swishUrl;
});
</script>
</body>
</html>
