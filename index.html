<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trädgård - Boxholm</title>

<style>
body { font-family: sans-serif; background:#111; color:white; text-align:center; }
.container { max-width:600px; margin:auto; background:#222; padding:20px; border-radius:15px; }
input { width:100%; padding:10px; margin:10px 0; background:#333; color:white; border:none; }
button { background:red; color:white; padding:15px; width:100%; font-size:20px; }
</style>
</head>

<body>

<div class="container">

<h1>🌿 Trädgårdshjälp</h1>

<input type="text" id="namn" placeholder="Förnamn Efternamn">
<input type="text" id="adress" placeholder="Storgatan 12, 590 10 Boxholm">
<input type="date" id="datum">

<p>💧 Vattna växter (300 kr)</p>
<input type="checkbox" id="vattna" onchange="rakna()">

<p>🌱 Rensa ogräs (50 kr / 15m)</p>
<input type="number" id="ogras" value="0" step="15" oninput="rakna()">

<p>✂️ Trimma (20 kr / 10m)</p>
<input type="number" id="trim" value="0" step="10" oninput="rakna()">

<h2 id="summa">0 kr</h2>

<button onclick="betala()">BETALA</button>

</div>

<script>

function rakna(){
let v = document.getElementById('vattna').checked ? 300 : 0;
let o = (document.getElementById('ogras').value/15)*50;
let t = (document.getElementById('trim').value/10)*20;
document.getElementById('summa').innerText = Math.round(v+o+t)+" kr";
}

function giltigAdress(adress){
adress = adress.toLowerCase();

let harNummer = /\d+/.test(adress); // måste ha nummer
let harGata = /[a-zåäö]+/.test(adress); // måste ha text
let harBoxholm = adress.includes("boxholm"); // måste vara boxholm

// postnummer Boxholm (590 eller 595)
let giltigtPostnr = /(590|595)\s?\d{2}/.test(adress);

return harNummer && harGata && harBoxholm && giltigtPostnr;
}

function betala(){

let namn = document.getElementById("namn").value.trim();
let adress = document.getElementById("adress").value.trim();
let datum = document.getElementById("datum").value;
let summa = document.getElementById("summa").innerText.replace(" kr","");

if(namn == "" || namn.split(" ").length < 2){
alert("Skriv förnamn + efternamn!");
return;
}

if(!giltigAdress(adress)){
alert("Skriv en riktig adress i Boxholm!\nEx: Storgatan 12, 590 10 Boxholm");
return;
}

if(datum == ""){
alert("Välj datum!");
return;
}

if(summa == "0"){
alert("Välj tjänst!");
return;
}

let msg = namn + " - " + adress + " - " + datum;

let url = "swish://payment?data=" + JSON.stringify({
version:1,
payee:{value:"0723782629"},
amount:{value:parseInt(summa)},
message:{value:msg}
});

window.location.href = url;

}

</script>

</body>
</html>
