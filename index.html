<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <title>Swish Test</title>
</head>
<body>

    <!-- Testformulär med dina ID-namn -->
    <input type="text" id="fornamn" value="Kalle">
    <input type="text" id="efternamn" value="Anka">
    <input type="text" id="adress" value="Storgatan 1, Boxholm">
    <input type="date" id="datum" value="2026-07-25">
    
    <!-- Test för dina kryssrutor och inputs -->
    <input type="checkbox" id="vattna" checked>
    <input type="number" id="ogras" value="2">
    <input type="number" id="trim" value="0">

    <!-- Din summa-ruta -->
    <div id="summa">500 kr</div>

    <!-- 🔥 KNAPPEN SOM STARTAR ALLT -->
    <button type="button" onclick="betalaMedSwish()">Betala nu</button>

    <div id="klart" style="display:none; color: green; font-weight: bold; margin-top: 20px;">
        Öppnar Swish...
    </div>

<script>
// 🔥 STARTEN SOM SAKNADES: Koden MÅSTE ligga inuti en funktion!
function betalaMedSwish() {
    
    let fornamn = document.getElementById("fornamn").value.trim();
    let efternamn = document.getElementById("efternamn").value.trim();
    let adress = document.getElementById("adress").value.toLowerCase();
    let datum = document.getElementById("datum").value;
    
    // Hämtar texten och rensar bort "kr" så vi får ett rent nummer
    let summaText = document.getElementById("summa").innerText.replace(/\D/g, "");
    let summa = parseInt(summaText) || 0;

    let vattna = document.getElementById("vattna").checked;
    let ogras = document.getElementById("ogras").value;
    let trim = document.getElementById("trim").value;

    if(fornamn === "" || efternamn === ""){
        alert("Du måste skriva förnamn och efternamn!");
        return;
    }

    if(!adress.includes("boxholm")){
        alert("Adressen måste vara i Boxholm!");
        return;
    }

    if(datum === ""){
        alert("Välj datum!");
        return;
    }

    if(summa === 0){
        alert("Välj minst en tjänst!");
        return;
    }

    let tjanster = [];
    if(vattna){ tjanster.push("Vattning"); }
    if(ogras > 0){ tjanster.push("Ogräs " + ogras + "h"); }
    if(trim > 0){ tjanster.push("Trim " + trim + "h"); }

    let tjanstText = tjanster.join(" + ");
    let nummer = "0723782629";
    let message = tjanstText + " - " + fornamn + " " + efternamn + ", " + datum;

    let swishData = {
        version: 1,
        payee: { value: nummer },
        amount: { value: summa },
        message: { value: message }
    };

    let swishUrl = "swish://payment?data=" + encodeURIComponent(JSON.stringify(swishData));

    // Skicka till Swish
    window.location.href = swishUrl;

    document.getElementById("klart").style.display = "block";
} // Slut-måsvingen som stänger funktionen
</script>

</body>
</html>
