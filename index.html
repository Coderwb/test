<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trädgårdshjälp Boxholm</title>

<style>
body {
    font-family: Arial;
    background:#121212;
    color:white;
    text-align:center;
    padding:20px;
}
.container {
    max-width:600px;
    margin:auto;
    background:#1e1e1e;
    padding:25px;
    border-radius:12px;
}
input {
    width:100%;
    padding:10px;
    margin-top:5px;
    border-radius:5px;
    border:1px solid #444;
    background:#333;
    color:white;
}
.price-box {
    background:#2a2a2a;
    padding:15px;
    margin:15px 0;
    border-radius:10px;
    text-align:left;
}
.total {
    font-size:22px;
    color:#4CAF50;
}
button {
    width:100%;
    padding:15px;
    font-size:20px;
    background:#ff3333;
    color:white;
    border:none;
    border-radius:8px;
    margin-top:20px;
}
</style>
</head>

<body>

<div class="container">
<h1>🌿 Trädgårdshjälp</h1>

<!-- NAMN -->
<div class="price-box">
<h3>👤 Ditt namn</h3>
<input type="text" id="fornamn" placeholder="Förnamn">
<input type="text" id="efternamn" placeholder="Efternamn">
</div>

<!-- ADRESS -->
<div class="price-box">
<h3>🏡 Din adress</h3>
<input type="text" id="adress" placeholder="Ex: Storgatan 12">
</div>

<!-- DATUM -->
<div class="price-box">
<h3>📅 Datum</h3>
<input type="date" id="datum">
</div>

<!-- TRIM -->
<div class="price-box">
<h3>✂️ Trimma</h3>
<p>50 kr/timme</p>
<input type="number" id="trim" min="0" value="0" oninput="rakna()">
</div>

<!-- OGRÄS -->
<div class="price-box">
<h3>🌱 Ogräs</h3>
<p>70 kr/timme</p>
<input type="number" id="ogras" min="0" value="0" oninput="rakna()">
</div>

<!-- VATTNA -->
<div class="price-box">
<h3>💧 Vattna</h3>
<label><input type="checkbox" id="vattna" onchange="rakna()"> 30 kr</label>
</div>

<!-- TOTAL -->
<div class="price-box">
<h3>💰 Totalt</h3>
<div class="total"><span id="summa">0</span> kr</div>
</div>

<button onclick="boka()">Boka & Betala</button>

</div>

<script>
function rakna(){
    let trim = document.getElementById("trim").value || 0;
    let ogras = document.getElementById("ogras").value || 0;
    let vattna = document.getElementById("vattna").checked;

    let total = (trim*50)+(ogras*70)+(vattna?30:0);
    document.getElementById("summa").innerText = total;
}

function giltigAdress(adress){
    return /[a-zA-ZåäöÅÄÖ]+\s\d+/.test(adress);
}

function boka(){
    let fn = document.getElementById("fornamn").value.trim();
    let en = document.getElementById("efternamn").value.trim();
    let adress = document.getElementById("adress").value.trim();
    let datum = document.getElementById("datum").value;
    let summa = document.getElementById("summa").innerText;

    if(!fn || !en){
        alert("Du måste skriva för- och efternamn!");
        return;
    }

    if(!giltigAdress(adress)){
        alert("Skriv en giltig adress (ex: Storgatan 12)");
        return;
    }

    if(!datum){
        alert("Välj datum!");
        return;
    }

    if(summa == 0){
        alert("Välj minst en tjänst!");
        return;
    }

    let meddelande =
    "Trädgårdshjälp\n" +
    fn + " " + en + "\n" +
    adress + "\n" +
    datum;

    let url = "swish://payment?data=" + JSON.stringify({
        version:1,
        payee:{value:"0723782629"},
        amount:{value:parseInt(summa)},
        message:{value:meddelande}
    });

    window.location.href = url;
}
</script>

</body>
</html>
