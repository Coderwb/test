<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Betala 25 kr med Swish</title>
<link href="https://googleapis.com" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body {
    background: #000000;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    font-family: 'Inter', sans-serif;
    color: #ff0000;
  }
  
  .container {
    background: rgba(255, 255, 255, 0.05);
    border: 2px solid #ff0000;
    border-radius: 24px;
    padding: 35px;
    max-width: 420px;
    width: 100%;
    box-shadow: 0 8px 32px rgba(255,0,0,0.1);
    text-align: center;
  }
  
  .swish-logo { font-size: 56px; margin-bottom: 15px; }
  h1 { font-size: 26px; font-weight: 800; margin-bottom: 8px; color: #ff0000; }
  
  .price {
    font-size: 42px;
    font-weight: 800;
    color: #ff0000;
    margin: 15px 0;
  }

  form { text-align: left; margin-top: 25px; }
  label { display: block; font-weight: 600; font-size: 14px; margin-bottom: 8px; }
  
  input {
    width: 100%;
    padding: 16px;
    border-radius: 14px;
    border: 2px solid #ff0000;
    background: rgba(0, 0, 0, 0.8);
    color: #ff0000;
    font-size: 17px;
    outline: none;
  }

  button {
    width: 100%;
    padding: 18px;
    margin-top: 25px;
    border: none;
    border-radius: 14px;
    background: #ff0000;
    color: #000000;
    font-weight: 800;
    font-size: 18px;
    cursor: pointer;
    box-shadow: 0 4px 15px rgba(255,0,0,0.3);
  }

  .qr-container {
    display: none;
    margin-top: 25px;
    animation: fadeIn 0.5s ease;
  }
  .qr-box {
    background: white;
    padding: 15px;
    border-radius: 16px;
    display: inline-block;
    margin-bottom: 15px;
  }
  .qr-box img {
    display: block;
    width: 220px;
    height: 220px;
  }
  .instructions {
    font-size: 14px;
    line-height: 1.5;
    color: #ff0000;
    font-weight: 600;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>
<div class="container">
  <div class="swish-logo">🔥</div>
  <h1>Betala med Swish</h1>
  <div class="price">25 kr</div>

  <form id="swishForm">
    <label for="payerNumber">Ditt telefonnummer</label>
    <input type="tel" id="payerNumber" placeholder="t.ex. 0701234567" required pattern="[0-9]{10}" inputmode="numeric">
    <button type="submit">Generera Swish-kod</button>
  </form>

  <div class="qr-container" id="qrContainer">
    <div class="qr-box">
      <!-- Använder en stabil global QR-generator som Swish-appen kan läsa av -->
      <img id="swishQr" src="" alt="Swish QR-kod">
    </div>
    <p class="instructions">
      📸 <strong>Mobil:</strong> Ta en skärmdump och ladda upp bilden i Swish-appen!<br><br>
      💻 <strong>Dator:</strong> Öppna Swish på mobilen och scanna av koden!<br><br>
      <em>Allt fylls i helt automatiskt (Nummer, Belopp & Beskrivning).</em>
    </p>
  </div>
</div>

<script>
document.getElementById('swishForm').addEventListener('submit', (e) => {
  e.preventDefault();
  
  const amount = 25;
  const message = "Tack";
  const phone = "0723782629";
  
  // Skapar en standardiserad Swish-sträng enligt Swish officiella struktur
  const swishString = `C0723782629;25;Tack;0`;
  
  // Genererar QR-koden via ett stabilt och öppet API som alltid laddar direkt på GitHub Pages
  const qrUrl = `https://qrserver.com{encodeURIComponent(swishString)}`;
  
  document.getElementById('swishQr').src = qrUrl;
  document.getElementById('qrContainer').style.display = 'block';
  document.getElementById('swishForm').style.display = 'none';
});
</script>
</body>
</html>
