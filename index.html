<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Betala 25 kr med Swish</title>
<link href="https://googleapis.com" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: linear-gradient(135deg, #00B86C, #009E5B, #007A47);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    font-family: 'Inter', sans-serif;
    color: white;
  }
  .container {
    background: rgba(255, 255, 255, 0.12);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255, 255, 255, 0.25);
    border-radius: 24px;
    padding: 35px;
    max-width: 420px;
    width: 100%;
    box-shadow: 0 8px 32px rgba(0,0,0,0.25);
    text-align: center;
  }
  .swish-logo { font-size: 56px; margin-bottom: 15px; }
  h1 { font-size: 26px; font-weight: 800; margin-bottom: 8px; }
  
  .price-box {
    margin: 20px 0;
  }
  .price {
    font-size: 42px;
    font-weight: 800;
    color: #fff;
    text-shadow: 0 2px 8px rgba(0,0,0,0.2);
  }
  .details {
    font-size: 15px;
    opacity: 0.9;
    line-height: 1.6;
    margin-top: 5px;
  }

  /* Formulär och Input */
  form {
    text-align: left;
    margin-top: 20px;
  }
  label { 
    display: block; 
    font-weight: 600; 
    font-size: 14px; 
    opacity: 0.95;
    margin-bottom: 8px;
  }
  input {
    width: 100%;
    padding: 16px;
    border-radius: 14px;
    border: 2px solid rgba(255,255,255,0.3);
    background: rgba(255,255,255,0.15);
    color: white;
    font-size: 17px;
    font-weight: 500;
    outline: none;
    transition: 0.2s;
  }
  input:focus {
    border-color: white;
    background: rgba(255,255,255,0.2);
  }
  input::placeholder { color: rgba(255,255,255,0.6); }

  /* Knapp */
  button {
    width: 100%;
    padding: 18px;
    margin-top: 25px;
    border: none;
    border-radius: 14px;
    background: white;
    color: #00B86C;
    font-weight: 800;
    font-size: 18px;
    cursor: pointer;
    transition: 0.2s;
    box-shadow: 0 4px 15px rgba(0,0,0,0.2);
  }
  button:hover { 
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(0,0,0,0.3);
  }
  button:active {
    transform: translateY(0px);
  }
</style>
</head>
<body>
<div class="container">
  <div class="swish-logo">💚</div>
  <h1>Betala med Swish</h1>
  
  <div class="price-box">
    <div class="price">25 kr</div>
    <div class="details">
      <strong>Till:</strong> 072-378 26 29<br>
      <strong>Beskrivning:</strong> Tack
    </div>
  </div>

  <!-- Formulär där användaren skriver sitt nummer -->
  <form id="swishForm">
    <label for="payerNumber">Ditt telefonnummer</label>
    <input type="tel" id="payerNumber" placeholder="t.ex. 0701234567" required pattern="[0-9]{10}" inputmode="numeric">

    <button type="submit">Öppna Swish & Betala</button>
  </form>
</div>

<script>
document.getElementById('swishForm').addEventListener('submit', (e) => {
  e.preventDefault();
  
  const amount = 25;
  const message = "Tack";
  const phone = "0723782629";
  
  // Öppnar Swish-appen med alla parametrar laddade i bakgrunden
  const swishUrl = `swish://payment?phone=${phone}&amount=${amount}&message=${encodeURIComponent(message)}`;
  
  window.location.href = swishUrl;

  // Reservmeddelande om appen inte öppnas automatiskt
  setTimeout(() => {
    alert('Om Swish-appen inte öppnades automatiskt, vänligen öppna den manuellt och swisha 25 kr till 0723782629 med meddelandet "Tack".');
  }, 1500);
});
</script>
</body>
</html>
